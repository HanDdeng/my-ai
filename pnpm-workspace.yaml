# pnpm 工作区声明：monorepo 内的子项目根。
# catalog 块集中管理跨子项目共享的依赖版本，子项目用 "catalog:" 引用。
# 优势：升级 TS / Vitest / Zod 之类的共享版本时只需改一处。
packages:
  - 'client'
  - 'gateway'
  - 'core'

# pnpm 10 默认忽略 native build 脚本，better-sqlite3 依赖 prebuild-install / node-gyp
# 生成 .node 绑定。Task 0.1 加依赖时忽略了 build 脚本，运行时 new Database() 会
# 报 "Could not locate the bindings file"。显式放行。
onlyBuiltDependencies:
  - better-sqlite3

catalog:
  # 跨子项目类型与运行时基建
  typescript: ^5.5.4
  '@types/node': ^22.8.6
  tsx: ^4.19.1

  # 跨子项目工具链
  eslint: ^9.13.0
  vitest: ^2.1.4

  # gateway + core 共用服务栈
  fastify: ^4.28.1
  fastify-plugin: ^4.5.1
  '@fastify/cors': ^9.0.1
  '@fastify/websocket': ^10.0.1
  pino: ^9.5.0
  'pino-pretty': ^11.3.0
  zod: ^3.23.8

  # 用于版本范围匹配（v2 compat 机制）
  semver: ^7.6.3
  '@types/semver': ^7.5.8

  # 用于网关持久化客户端配对记录（v3 鉴权机制）
  better-sqlite3: ^11.5.0
  # better-sqlite3 的 TypeScript 类型
  '@types/better-sqlite3': ^7.6.11

  # v5 客户端 i18n
  i18next: ^23.16.4
  react-i18next: ^15.1.0

allowBuilds:
  better-sqlite3: true
  esbuild: true
