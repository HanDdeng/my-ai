# Dependabot 配置：v1 阶段策略
#   - version-updates（自动升级依赖版本）：关
#   - security-updates（CVE 触发自动升级）：开（在仓库 Settings → Code security and analysis 启用）
#
# enabled: false 只关 version-updates，不影响 security-updates。
# security-updates 一旦开，GitHub 会在依赖出现 GHSA 漏洞时自动开 PR 升级到修复版。
#
# v2 阶段若要重新打开 version-updates，把 enabled 改 true 并加回 updates: 块；
# 建议先 monthly + open-pull-requests-limit: 1 起步。

version: 2
enabled: false
