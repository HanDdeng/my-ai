name: release

# ⚠️ 临时性改写（方便测试 release workflow 逻辑）⚠️
#
# 触发时机：创建合入主分支的 PR 时（pull_request event，target=main）。
# 行为：完整跑通整个 release workflow 链路（checkout / 读版本 / 渲染 body /
#       产物判定 / 模拟创建 / 模拟上传），但 **不实际调用 gh release create / upload**，
#       所有可能产生外部副作用的步骤都用 echo 输出"将要做什么"以供核对。
#
# 预期效果：每次打开 / 同步 / 重新打开 PR 都会跑一次本 workflow，可在 Actions 标签
#           看到完整日志，验证：
#             - checkout 是否切到 PR 头
#             - 版本号读取是否正确
#             - render-release-notes.sh 输出是否符合预期
#             - has_artifacts 判定逻辑（测试时固定为 false）
#             - 模拟的 gh release create / upload 命令拼装是否正确
#
# 恢复原行为（去掉 DRY-RUN 标记）：
#   1) on: 改回 workflow_run + branches:[main] + types:[completed]
#   2) job if: 改回 github.event.workflow_run.conclusion == 'success'
#   3) checkout ref: 改回 ${{ github.event.workflow_run.head_sha }}
#   4) 取消 "下载所有平台产物" 的 if: false
#   5) 取消 "检查是否有产物" 里 has_artifacts 的硬编码
#   6) 把 "[DRY-RUN]" 两个 step 里的 echo 改回 gh release create / upload

on:
  # 临时：PR 触发（target=main）—— 等价于"合入主分支前的最后状态"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  # gh release create / upload 需要写仓库权限。DRY-RUN 模式下也保留以保持权限声明一致。
  contents: write
  # 跨 workflow 拉产物必须 actions: read。DRY-RUN 模式下不实际下载，但保留声明便于恢复时无需补加。
  actions: read

jobs:
  release:
    # 临时：PR 触发时跑
    name: '[DRY-RUN] 自动出 release（PR 触发，临时测试）'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      # pull_request 默认 checkout 的是 PR 合并提交；为与 release body 里的 commit log
      # 对齐（diff 起点是 PR head），显式切到 PR 头 SHA。
      - name: Checkout triggering commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # render-release-notes.sh 用 node -e 读 matrix；此 job 不装 pnpm，故 cache 关掉。
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: 读 client 版本
        id: version
        run: |
          v=$(node -p "require('./versions/compat-matrix.json').components.client.version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "client 版本：$v"

      # DRY-RUN 模式：对比基准用 origin/main 当前 SHA（不是 last release tag）。
      # 这样 release body 反映"这个 PR 改了什么"（main..HEAD 的 diff），
      # 而不是"上次 release 以来改了什么"——后者在 PR 阶段会把历史 commit
      # 之间的变更也算进来，掩盖 PR 本身的边界。
      # 真正的 production release（恢复原 trigger 后）会用 last release tag。
      - name: '读对比基准（DRY-RUN: origin/main）'
        id: last
        run: |
          last=$(git rev-parse origin/main 2>/dev/null || echo "")
          if [ -z "$last" ]; then
            echo "⚠ 未取到 origin/main，diff 段可能为空"
          else
            echo "对比基准 origin/main：$last"
          fi
          echo "last=$last" >> "$GITHUB_OUTPUT"

      # 临时：跳过实际下载（PR 触发时与 build.yml 并行跑，跨 workflow 拉产物不现实）。
      # has_artifacts 在下一步硬编码为 false，模拟"client 未变更"路径。
      - name: 下载所有平台产物
        if: false
        uses: actions/download-artifact@v5
        with:
          # 恢复时把下面三行解注：
          # run-id: ${{ github.event.workflow_run.id }}
          # github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts
          pattern: my-ai-client-*
          merge-multiple: true
          if-no-files-found: warn

      - name: 检查是否有产物
        id: check
        run: |
          # 临时：DRY-RUN 模式固定为 false（实际 download step 已被 skip）
          echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
          echo "（DRY-RUN：download step 已 skip，has_artifacts 固定为 false）"
          # 恢复时把上面两行换回下面的真实检测：
          # if compgen -G "artifacts/*" > /dev/null; then
          #   count=$(find artifacts -maxdepth 1 -type f | wc -l)
          #   echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          #   echo "✓ 检出 $count 个产物文件"
          # else
          #   echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
          #   echo "✗ 无产物（client 未变更，build-* 全部 skip）"
          # fi

      # 渲染 body 仍真实跑——可看 commit log diff 是否正确反映 PR 内容。
      - name: 渲染 release body
        run: |
          set -e
          BODY=$(bash .github/scripts/render-release-notes.sh "${{ steps.last.outputs.last }}")
          echo "$BODY" > /tmp/release-body.md
          echo "---- release body 预览 ----"
          cat /tmp/release-body.md
          echo "---- end ----"

      # 临时：DRY-RUN——只 echo"将要做什么"，不调 gh release create。
      - name: '[DRY-RUN] 创建 GitHub Release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="release-${DATE}-${SHORT_SHA}"
          echo "[DRY-RUN] would run: gh release create $TAG \\"
          echo "    --title 'my-ai $TAG' \\"
          echo "    --notes-file /tmp/release-body.md \\"
          echo "    --target ${{ github.event.pull_request.base.ref }}"
          echo "---- body 前 30 行预览 ----"
          head -30 /tmp/release-body.md || echo "(body file not found)"
          echo "---- end ----"
          # 恢复时把上面 5 行 echo 换回：
          # gh release create "$TAG" \
          #   --title "my-ai $TAG" \
          #   --notes-file /tmp/release-body.md \
          #   --target main
          # echo "✓ release $TAG 已创建"

      # macOS .app 打包：DRY-RUN 下 has_artifacts 固定为 false，理论上这步被 skip；
      # 但万一未来调整了 has_artifacts 判定，这里也改成 echo。
      - name: '[DRY-RUN] macOS .app 打包为 zip'
        if: steps.check.outputs.has_artifacts == 'true'
        run: |
          echo "[DRY-RUN] would zip .app directories in artifacts/"
          if compgen -G "artifacts/*.app" > /dev/null; then
            for app in artifacts/*.app; do
              echo "  would zip: $app → ${app%.app}-macos-universal-app.zip"
            done
          else
            echo "（未发现 *.app，跳过 zip 步骤）"
          fi

      # 临时：DRY-RUN——只 echo"将要上传什么"，不调 gh release upload。
      - name: '[DRY-RUN] 上传产物到 release'
        if: steps.check.outputs.has_artifacts == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="release-${DATE}-${SHORT_SHA}"
          echo "[DRY-RUN] would run: gh release upload $TAG <files>"
          if compgen -G "artifacts/*" > /dev/null; then
            echo "files that would be uploaded:"
            find artifacts -maxdepth 1 -type f | sort | sed 's/^/  - /'
          else
            echo "（无产物可挂——DRY-RUN 默认不下载）"
          fi
          # 恢复时换回真实 mapfile + gh release upload 逻辑
