name: build

on:
  # CI 触发规则：
  #   1) PR opened/synchronize/reopened（目标分支 main） → 跑 quality + 三平台 build
  #   2) push 到 main（PR 合入后触发） → 跑 quality + 三平台 build + 自动出 release
  #   3) workflow_dispatch → 手动重跑（用于紧急排查或 release.yml 删除后补跑）
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  # 业务代码与 actions v5/v6 一律用 Node 24 LTS；
  # 当前 GitHub runner 默认仍以 Node 20 跑 actions v5（v5 自身尚未完全迁移到 Node 24），
  # 需显式强制。GitHub 会在 2026-06-16 后默认启用。
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24'

permissions:
  contents: read
  # gitleaks-action 需要读 PR 列表才能按 commit 增量扫描；不开就 403。
  pull-requests: read

jobs:
  # detect-changes：用 dorny/paths-filter 看本次事件是否动过 client/** 或
  # versions/compat-matrix.json。两者都没动 → 跳过后续 quality / build-* / release，
  # 节省 CI 分钟（PR 只改 docs/gateway/core 时尤其明显）。
  detect-changes:
    name: 检测客户端变更
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      client: ${{ steps.filter.outputs.client }}
    steps:
      # paths-filter 对 push / workflow_dispatch 事件要做 git diff，
      # 需要至少 HEAD~1 的历史；最简单是 fetch-depth: 0 全量。
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # PR 用 PR base.sha；push / workflow_dispatch fallback 到 HEAD~1。
          base: ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          filters: |
            client:
              - 'client/**'
              - 'versions/compat-matrix.json'

  # 质量闸门：lint / typecheck / test + dedupe + secret scan 五关全过才放行后续平台构建。
  # 跑在 ubuntu-latest 上，速度最快且无平台差异。
  # 客户端无变更时整体跳过（detect-changes.outputs.client != 'true'）。
  quality:
    name: Lint / typecheck / test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-changes
    if: needs.detect-changes.outputs.client == 'true'
    steps:
      # fetch-depth: 0 让 gitleaks 能算 PR base..head 的 commit 范围；
      # 默认 1（浅克隆）下 gitleaks 找不到 base commit，会 fatal: unknown revision。
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # 检查 monorepo lockfile 有没有可合并的重复依赖；非零即视为有可优化空间。
      - name: Dedupe check
        run: pnpm dedupe --check

      # 扫 git 历史找误提交的 API key / token / 私钥。PR 合入前必过。
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # client 端的 compat.generated.{ts,js} 由 sync-compat.mjs 现场生成，
      # 仓库内不提交（被 .gitignore）。CI 冷启动时必须先跑 sync:compat，
      # 否则 typecheck 会在 client/src/App.tsx 等处报 TS2307。
      - name: Sync compat slices
        run: pnpm run sync:compat

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Lint
        run: pnpm -r run lint

      - name: Test
        run: pnpm -r run test

  build-macos:
    name: macOS (universal)
    runs-on: macos-latest
    timeout-minutes: 60
    needs: [detect-changes, quality]
    if: needs.detect-changes.outputs.client == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # 从 versions/compat-matrix.json 读 client 版本，用于产物名拼装。
      # runner 自带 node，无需 setup-node；shell: bash 保跨平台一致。
      - name: Read client version
        id: version
        shell: bash
        run: |
          v=$(node -p "require('./versions/compat-matrix.json').components.client.version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "client 版本：$v"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # client 端的 compat.generated.ts 是 sync-compat.mjs 现场生成的，
      # gitignore 仓库内不提交。每个 platform runner 都是独立 checkout，
      # build frontend 前必须先跑 sync:compat，否则 tsc 会报 TS2307。
      - name: Sync compat slices
        run: pnpm run sync:compat

      - name: Build frontend
        run: pnpm --filter @my-ai/client run build

      - name: Setup Rust (Apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target

      - name: Generate Tauri icons
        working-directory: client
        run: pnpm exec tauri icon ./assets/icon-source.png

      - name: Build Tauri app (universal)
        working-directory: client
        run: pnpm exec tauri build --target universal-apple-darwin --bundles app,dmg

      # 产物名含版本号：my-ai-client-X.Y.Z-macos-universal（.app）
      - name: Upload .app
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-client-${{ steps.version.outputs.version }}-macos-universal
          path: client/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error

      # 产物名含版本号：my-ai-client-X.Y.Z-macos-universal-dmg（.dmg）
      - name: Upload .dmg
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-client-${{ steps.version.outputs.version }}-macos-universal-dmg
          path: client/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [detect-changes, quality]
    if: needs.detect-changes.outputs.client == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read client version
        id: version
        shell: bash
        run: |
          v=$(node -p "require('./versions/compat-matrix.json').components.client.version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "client 版本：$v"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # client 端的 compat.generated.ts 是 sync-compat.mjs 现场生成的，
      # gitignore 仓库内不提交。每个 platform runner 都是独立 checkout，
      # build frontend 前必须先跑 sync:compat，否则 tsc 会报 TS2307。
      - name: Sync compat slices
        run: pnpm run sync:compat

      - name: Build frontend
        run: pnpm --filter @my-ai/client run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target

      - name: Generate Tauri icons
        working-directory: client
        run: pnpm exec tauri icon ./assets/icon-source.png

      - name: Build Tauri app (deb + AppImage)
        working-directory: client
        run: pnpm exec tauri build --target x86_64-unknown-linux-gnu --bundles deb,appimage

      # 产物名含版本号：my-ai-client-X.Y.Z-linux-x64-deb
      - name: Upload .deb
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-client-${{ steps.version.outputs.version }}-linux-x64-deb
          path: client/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          if-no-files-found: error

      # 产物名含版本号：my-ai-client-X.Y.Z-linux-x64-appimage
      - name: Upload .AppImage
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-client-${{ steps.version.outputs.version }}-linux-x64-appimage
          path: client/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    timeout-minutes: 60
    needs: [detect-changes, quality]
    if: needs.detect-changes.outputs.client == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Windows runner 默认 shell 是 pwsh，强制 bash 才能跟 macOS/Linux 写法一致。
      - name: Read client version
        id: version
        shell: bash
        run: |
          v=$(node -p "require('./versions/compat-matrix.json').components.client.version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "client 版本：$v"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # client 端的 compat.generated.ts 是 sync-compat.mjs 现场生成的，
      # gitignore 仓库内不提交。每个 platform runner 都是独立 checkout，
      # build frontend 前必须先跑 sync:compat，否则 tsc 会报 TS2307。
      - name: Sync compat slices
        run: pnpm run sync:compat

      - name: Build frontend
        run: pnpm --filter @my-ai/client run build

      - name: Setup Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target

      - name: Generate Tauri icons
        working-directory: client
        run: pnpm exec tauri icon ./assets/icon-source.png

      - name: Build Tauri app (MSI + NSIS)
        working-directory: client
        run: pnpm exec tauri build --target x86_64-pc-windows-msvc --bundles msi,nsis

      # 产物名含版本号：my-ai-client-X.Y.Z-windows-x64-msi
      - name: Upload .msi
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-client-${{ steps.version.outputs.version }}-windows-x64-msi
          path: client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error

      # 产物名含版本号：my-ai-client-X.Y.Z-windows-x64-nsis（.exe）
      - name: Upload NSIS .exe
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-client-${{ steps.version.outputs.version }}-windows-x64-nsis
          path: client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error

  # release：仅在 push 到 main 且确实有客户端变更时跑。
  # 之前在独立的 release.yml 里，现在并入 build.yml，让 release 严格依赖三平台 build 成功。
  # 三平台 build 任一失败 → release 不创建，避免没产物的 release 出现。
  release:
    name: 自动出 release（push 到 main 后）
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [detect-changes, build-macos, build-linux, build-windows]
    if: github.event_name == 'push' && needs.detect-changes.outputs.client == 'true'
    permissions:
      # gh release create / upload 需要写仓库权限。
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # render-release-notes.sh 要算 last_tag..HEAD 的 git log，必须全量历史。
          fetch-depth: 0

      # render-release-notes.sh 用 node -e 读 matrix；此 job 不装 pnpm，故 cache 关掉。
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: 读 client 版本
        id: version
        run: |
          v=$(node -p "require('./versions/compat-matrix.json').components.client.version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "client 版本：$v"

      - name: 读上次 release tag
        id: last
        run: |
          last=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "last=$last" >> "$GITHUB_OUTPUT"
          if [ -z "$last" ]; then
            echo "无上次 release（首次出 baseline）"
          else
            echo "上次 release tag：$last"
          fi

      - name: 计算新 release tag
        id: tag
        run: |
          DATE=$(date +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="release-${DATE}-${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "新 release tag：$TAG"

      - name: 渲染 release body
        run: |
          set -e
          BODY=$(bash .github/scripts/render-release-notes.sh "${{ steps.last.outputs.last }}")
          echo "$BODY" > /tmp/release-body.md
          echo "---- release body 预览 ----"
          cat /tmp/release-body.md
          echo "---- end ----"

      - name: 创建 GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "my-ai ${{ steps.tag.outputs.tag }}" \
            --notes-file /tmp/release-body.md \
            --target main
          echo "✓ release ${{ steps.tag.outputs.tag }} 已创建"

      # 把上游三个 build-* 任务的 6 个产物全部下载到 artifacts/ 目录。
      # merge-multiple: true → 不按 artifact 名建子目录，直接平铺到 artifacts/。
      - name: 下载所有平台产物
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: my-ai-client-*
          merge-multiple: true

      # macOS .app 是目录，gh release upload 只接受文件 → 先 zip 成 *-app.zip。
      # zip 后原 .app 目录保留也无所谓，下一步用 -type f 自动过滤掉。
      - name: macOS .app 打包为 zip
        run: |
          set -e
          cd artifacts
          if compgen -G "*.app" > /dev/null; then
            for app in *.app; do
              zip -ry "${app%.app}-macos-universal-app.zip" "$app"
              echo "已打包：$app → ${app%.app}-macos-universal-app.zip"
            done
          else
            echo "（未发现 *.app，跳过 zip 步骤）"
          fi

      - name: 上传产物到 release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # 只挂顶层文件（.app 目录用 -type f 自动过滤；.app/Contents/... 用 -maxdepth 1 排除）
          mapfile -t files < <(find artifacts -maxdepth 1 -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "✖ artifacts 下没有可挂的文件，release upload 失败"
            ls -la artifacts
            exit 1
          fi
          echo "将上传到 release 的文件（${#files[@]} 个）："
          printf '  - %s\n' "${files[@]}"
          gh release upload "${{ steps.tag.outputs.tag }}" "${files[@]}"
          echo "✓ 所有产物已挂到 release ${{ steps.tag.outputs.tag }}"
