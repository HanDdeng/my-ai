name: build

on:
  # CI 触发规则：
  #   1) PR opened/synchronize/reopened（目标分支 main） → 跑 quality + 三平台 build
  #   2) workflow_dispatch → 手动重跑（用于紧急排查）
  # 注：合入 main 后不再单独跑 build，避免与 PR build 重复消耗 CI 分钟数。
  #     release.yml 当前是禁用状态（if: false）；恢复"合入即发布"时需重新设计触发链
  #     （例如复用 PR build 产物，而不是 push 重建）。
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

env:
  # 业务代码与 actions v5/v6 一律用 Node 24 LTS；
  # 当前 GitHub runner 默认仍以 Node 20 跑 actions v5（v5 自身尚未完全迁移到 Node 24），
  # 需显式强制。GitHub 会在 2026-06-16 后默认启用。
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24'

permissions:
  contents: read
  # gitleaks-action 需要读 PR 列表才能按 commit 增量扫描；不开就 403。
  pull-requests: read

jobs:
  # detect-changes：用 dorny/paths-filter 看本次事件是否动过 client/** 或
  # versions/compat-matrix.json。两者都没动 → 跳过 build-* / release，
  # 节省 CI 分钟。quality 是必过闸门，与本 job 并行（不读取本输出），
  # 任何 PR 都跑，docs/gateway/core 等非 client 变更不会再绕开验证。
  detect-changes:
    name: 检测客户端变更
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      client: ${{ steps.filter.outputs.client }}
    steps:
      # paths-filter 对 push / workflow_dispatch 事件要做 git diff，
      # 需要至少 HEAD~1 的历史；最简单是 fetch-depth: 0 全量。
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # PR 用 PR base.sha；push / workflow_dispatch fallback 到 HEAD~1。
          base: ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          filters: |
            client:
              - 'client/**'
              - 'versions/compat-matrix.json'

  # 质量闸门：lint / typecheck / test + dedupe + secret scan 五关全过才放行后续平台构建。
  # 跑在 ubuntu-latest 上，速度最快且无平台差异。
  # 与 detect-changes 并行（不 needs、不读其 outputs）：quality 是必过闸门，
  # 任何 PR 都要跑，确保非 client 变更（docs / CI / gateway / core）不会绕过验证。
  # build-* / release 仍走 detect-changes 的 client 输出决定要不要跑。
  quality:
    name: Lint / typecheck / test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # fetch-depth: 0 让 gitleaks 能算 PR base..head 的 commit 范围；
      # 默认 1（浅克隆）下 gitleaks 找不到 base commit，会 fatal: unknown revision。
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # 检查 monorepo lockfile 有没有可合并的重复依赖；非零即视为有可优化空间。
      - name: Dedupe check
        run: pnpm dedupe --check

      # 扫 git 历史找误提交的 API key / token / 私钥。PR 合入前必过。
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # client 端的 compat.generated.{ts,js} 由 sync-compat.mjs 现场生成，
      # 仓库内不提交（被 .gitignore）。CI 冷启动时必须先跑 sync:compat，
      # 否则 typecheck 会在 client/src/App.tsx 等处报 TS2307。
      - name: Sync compat slices
        run: pnpm run sync:compat

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Lint
        run: pnpm -r run lint

      - name: Test
        run: pnpm -r run test

  build-macos:
    name: macOS (universal)
    runs-on: macos-latest
    timeout-minutes: 60
    needs: [detect-changes, quality]
    if: needs.detect-changes.outputs.client == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # 从 versions/compat-matrix.json 读 client 版本，用于产物名拼装。
      # runner 自带 node，无需 setup-node；shell: bash 保跨平台一致。
      - name: Read client version
        id: version
        shell: bash
        run: |
          v=$(node -p "require('./versions/compat-matrix.json').components.client.version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "client 版本：$v"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # client 端的 compat.generated.ts 是 sync-compat.mjs 现场生成的，
      # gitignore 仓库内不提交。每个 platform runner 都是独立 checkout，
      # build frontend 前必须先跑 sync:compat，否则 tsc 会报 TS2307。
      - name: Sync compat slices
        run: pnpm run sync:compat

      - name: Build frontend
        run: pnpm --filter @my-ai/client run build

      - name: Setup Rust (Apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target

      - name: Generate Tauri icons
        working-directory: client
        run: pnpm exec tauri icon ./assets/icon-source.png

      - name: Build Tauri app (universal)
        working-directory: client
        run: pnpm exec tauri build --target universal-apple-darwin --bundles app,dmg

      # Smoke launch：编译过 ≠ 启动不崩。macOS runner 有 window server，GUI 进程能跑。
      - name: Smoke launch
        run: |
          BIN="client/src-tauri/target/universal-apple-darwin/release/my-ai-client"
          if [ ! -f "$BIN" ]; then
            echo "smoke: $BIN not found"
            exit 1
          fi
          LOG=$(mktemp)
          "$BIN" > "$LOG" 2>&1 &
          PID=$!
          sleep 8
          if kill -0 $PID 2>/dev/null; then
            echo "smoke: app alive after 8s, killing"
            # || true 防止 set -e 被 kill -9 后的 wait 非零 exit 触发
            # （被 SIGKILL 杀死的进程 exit 137），否则脚本 abort、cleanup 跳过。
            kill -9 $PID 2>/dev/null || true
            wait $PID 2>/dev/null || true
            echo "--- startup output (前 20 行) ---"
            head -n 20 "$LOG" || true
            rm -f "$LOG"
          else
            echo "smoke: FAILED — app died within 8s"
            echo "--- output ---"
            cat "$LOG"
            rm -f "$LOG"
            exit 1
          fi

      # 产物名含版本号：my-ai-client-X.Y.Z-macos-universal（.app）
      - name: Upload .app
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-client-${{ steps.version.outputs.version }}-macos-universal
          path: client/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error

      # 产物名含版本号：my-ai-client-X.Y.Z-macos-universal-dmg（.dmg）
      - name: Upload .dmg
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-client-${{ steps.version.outputs.version }}-macos-universal-dmg
          path: client/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [detect-changes, quality]
    if: needs.detect-changes.outputs.client == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read client version
        id: version
        shell: bash
        run: |
          v=$(node -p "require('./versions/compat-matrix.json').components.client.version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "client 版本：$v"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # client 端的 compat.generated.ts 是 sync-compat.mjs 现场生成的，
      # gitignore 仓库内不提交。每个 platform runner 都是独立 checkout，
      # build frontend 前必须先跑 sync:compat，否则 tsc 会报 TS2307。
      - name: Sync compat slices
        run: pnpm run sync:compat

      - name: Build frontend
        run: pnpm --filter @my-ai/client run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target

      - name: Generate Tauri icons
        working-directory: client
        run: pnpm exec tauri icon ./assets/icon-source.png

      - name: Build Tauri app (deb + AppImage)
        working-directory: client
        run: pnpm exec tauri build --target x86_64-unknown-linux-gnu --bundles deb,appimage

      # Linux runner 无显示设备；用 Xvfb 提供虚拟 framebuffer 才能跑 Tauri 窗口。
      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      # Smoke launch：编译过 ≠ 启动不崩。
      - name: Smoke launch
        run: |
          BIN="client/src-tauri/target/x86_64-unknown-linux-gnu/release/my-ai-client"
          if [ ! -f "$BIN" ]; then
            echo "smoke: $BIN not found"
            exit 1
          fi
          LOG=$(mktemp)
          xvfb-run -a "$BIN" > "$LOG" 2>&1 &
          PID=$!
          sleep 8
          if kill -0 $PID 2>/dev/null; then
            echo "smoke: app alive after 8s, killing"
            # || true 防止 set -e 被 kill -9 后的 wait 非零 exit 触发
            # （被 SIGKILL 杀死的进程 exit 137），否则脚本 abort、cleanup 跳过。
            kill -9 $PID 2>/dev/null || true
            wait $PID 2>/dev/null || true
            echo "--- startup output (前 20 行) ---"
            head -n 20 "$LOG" || true
            rm -f "$LOG"
          else
            echo "smoke: FAILED — app died within 8s"
            echo "--- output ---"
            cat "$LOG"
            rm -f "$LOG"
            exit 1
          fi

      # 产物名含版本号：my-ai-client-X.Y.Z-linux-x64-deb
      - name: Upload .deb
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-client-${{ steps.version.outputs.version }}-linux-x64-deb
          path: client/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          if-no-files-found: error

      # 产物名含版本号：my-ai-client-X.Y.Z-linux-x64-appimage
      - name: Upload .AppImage
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-client-${{ steps.version.outputs.version }}-linux-x64-appimage
          path: client/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    timeout-minutes: 60
    needs: [detect-changes, quality]
    if: needs.detect-changes.outputs.client == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Windows runner 默认 shell 是 pwsh，强制 bash 才能跟 macOS/Linux 写法一致。
      - name: Read client version
        id: version
        shell: bash
        run: |
          v=$(node -p "require('./versions/compat-matrix.json').components.client.version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "client 版本：$v"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # client 端的 compat.generated.ts 是 sync-compat.mjs 现场生成的，
      # gitignore 仓库内不提交。每个 platform runner 都是独立 checkout，
      # build frontend 前必须先跑 sync:compat，否则 tsc 会报 TS2307。
      - name: Sync compat slices
        run: pnpm run sync:compat

      - name: Build frontend
        run: pnpm --filter @my-ai/client run build

      - name: Setup Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target

      - name: Generate Tauri icons
        working-directory: client
        run: pnpm exec tauri icon ./assets/icon-source.png

      - name: Build Tauri app (MSI + NSIS)
        working-directory: client
        run: pnpm exec tauri build --target x86_64-pc-windows-msvc --bundles msi,nsis

      # Smoke launch：编译过 ≠ 启动不崩。windows-latest runner 有桌面会话，GUI 进程能跑。
      # 启动后 8s 内进程死了 = startup crash；抓 stderr/stdout 便于排查。
      - name: Smoke launch
        shell: pwsh
        run: |
          $exe = "client/src-tauri/target/x86_64-pc-windows-msvc/release/my-ai-client.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "smoke: $exe not found"
            exit 1
          }
          $out = [System.IO.Path]::GetTempFileName()
          $err = [System.IO.Path]::GetTempFileName()
          $proc = Start-Process -FilePath $exe -PassThru -RedirectStandardOutput $out -RedirectStandardError $err
          Start-Sleep -Seconds 8
          if (Get-Process -Id $proc.Id -ErrorAction SilentlyContinue) {
            Write-Host "smoke: app alive after 8s, killing"
            Stop-Process -Id $proc.Id -Force
            Write-Host "--- startup stdout (前 20 行) ---"
            if (Test-Path $out) { Get-Content $out -TotalCount 20 }
            Write-Host "--- startup stderr (前 20 行) ---"
            if (Test-Path $err) { Get-Content $err -TotalCount 20 }
            Remove-Item $out, $err -ErrorAction SilentlyContinue
          } else {
            Write-Error "smoke: FAILED — app died within 8s"
            Write-Host "--- stdout ---"
            if (Test-Path $out) { Get-Content $out }
            Write-Host "--- stderr ---"
            if (Test-Path $err) { Get-Content $err }
            Remove-Item $out, $err -ErrorAction SilentlyContinue
            exit 1
          }

      # 产物名含版本号：my-ai-client-X.Y.Z-windows-x64-msi
      - name: Upload .msi
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-client-${{ steps.version.outputs.version }}-windows-x64-msi
          path: client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error

      # 产物名含版本号：my-ai-client-X.Y.Z-windows-x64-nsis（.exe）
      - name: Upload NSIS .exe
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-client-${{ steps.version.outputs.version }}-windows-x64-nsis
          path: client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
