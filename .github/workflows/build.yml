name: build

on:
  # CI 只在向主分支发起 PR 时才跑，避免 dev-* 频繁推送浪费 CI 分钟。
  # 合入 main 之后需要再次校验可手动 workflow_dispatch。
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # 业务代码与 actions v5/v6 一律用 Node 24 LTS；
  # 当前 GitHub runner 默认仍以 Node 20 跑 actions v5（v5 自身尚未完全迁移到 Node 24），
  # 需显式强制。GitHub 会在 2026-06-16 后默认启用。
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24'

permissions:
  contents: read

jobs:
  # 质量闸门：lint / typecheck / test + dedupe + secret scan 五关全过才放行后续平台构建。
  # 跑在 ubuntu-latest 上，速度最快且无平台差异。
  quality:
    name: Lint / typecheck / test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # 检查 monorepo lockfile 有没有可合并的重复依赖；非零即视为有可优化空间。
      - name: Dedupe check
        run: pnpm dedupe --check

      # 扫 git 历史找误提交的 API key / token / 私钥。PR 合入前必过。
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Lint
        run: pnpm -r run lint

      - name: Test
        run: pnpm -r run test

  build-macos:
    name: macOS (universal)
    runs-on: macos-latest
    timeout-minutes: 60
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @my-ai/client run build

      - name: Setup Rust (Apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target

      - name: Generate Tauri icons
        working-directory: client
        run: pnpm exec tauri icon ./assets/icon-source.png

      - name: Build Tauri app (universal)
        working-directory: client
        run: pnpm exec tauri build --target universal-apple-darwin --bundles app,dmg

      - name: Upload .app
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-macos-app
          path: client/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload .dmg
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-macos-dmg
          path: client/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @my-ai/client run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target

      - name: Generate Tauri icons
        working-directory: client
        run: pnpm exec tauri icon ./assets/icon-source.png

      - name: Build Tauri app (deb + AppImage)
        working-directory: client
        run: pnpm exec tauri build --target x86_64-unknown-linux-gnu --bundles deb,appimage

      - name: Upload .deb
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-linux-deb
          path: client/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Upload .AppImage
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-linux-appimage
          path: client/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    timeout-minutes: 60
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @my-ai/client run build

      - name: Setup Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target

      - name: Generate Tauri icons
        working-directory: client
        run: pnpm exec tauri icon ./assets/icon-source.png

      - name: Build Tauri app (MSI + NSIS)
        working-directory: client
        run: pnpm exec tauri build --target x86_64-pc-windows-msvc --bundles msi,nsis

      - name: Upload .msi
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-windows-msi
          path: client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS .exe
        uses: actions/upload-artifact@v5
        with:
          name: my-ai-windows-nsis
          path: client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
