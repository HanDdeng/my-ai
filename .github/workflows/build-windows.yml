name: build-windows

on:
  push:
    branches: [main, 'dev-*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Tauri app (Windows MSI + NSIS)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @my-ai/client run build

      - name: Setup Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            client/src-tauri -> target
            . -> ~/.cargo/registry

      - name: Generate Tauri icons
        working-directory: client
        run: pnpm exec tauri icon ./assets/icon-source.png

      - name: Build Tauri app (MSI + NSIS)
        working-directory: client
        run: pnpm exec tauri build --target x86_64-pc-windows-msvc --bundles msi,nsis

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: my-ai-windows-msi
          path: client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: my-ai-windows-nsis
          path: client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
